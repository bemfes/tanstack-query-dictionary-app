name: CI/CD Pipeline
on: 
  push:
      branches:
        - main
      paths-ignore:
        - '**.md'
permissions: 
  contents: read 
  pages: write 
  id-token: write

concurrency:
  group: pages 
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Get repository code
        uses: actions/checkout@v3
      - name: Cache dependencies 
        uses: actions/cache@v3 
        with:
          path: ~/.npm
          key: npm-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-cache-
      - name: Install dependencies
        run: npm ci
      - name: Run lint 
        run: npm run lint
  test:
    runs-on: ubuntu-latest 
    steps: 
      - name: Get repository code
        uses: actions/checkout@v3
      - name: Cache dependencies 
        uses: actions/cache@v3 
        with:
          path: ~/.npm
          key: npm-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-cache-
      - name: Install dependencies
        run: npm ci
      - name: Run tests 
        run: npm run test
  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - name: Get repository code
        uses: actions/checkout@v3
      - name: Cache dependencies
        uses: actions/cache@v3 
        with:
          path: ~/.npm
          key: npm-cache-${{ hashFiles('**/package-lock.json') }}
          restore-keys: npm-cache-
      - name: Install dependencies
        run: npm ci
      - name: Run build
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist
  deploy: 
    needs: build 
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps: 
      - name: Deploy to GitHub Pages 
        id: deployment
        uses: actions/deploy-pages@v4

